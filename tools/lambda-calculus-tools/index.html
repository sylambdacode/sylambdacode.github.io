        <br />
        <p>本页面采用<a href="https://github.com/bjorn3/browser_wasi_shim">browser_wasi_shim</a>来实现WASI，该项目由<a href="https://github.com/bjorn3">@bjorn3</a>等人实现。</p>

            document.getElementById('error-message').hidden = true;

            async function runWasm(code, stdout, stderr, mode) {
                let env = [""]; // WASI环境变量
		let args = undefined
		if (mode == "calculate") {
                    args = ['lambda-calculus-tools', 'calculate', 'main', 'code.lam'];
		} else {
                    args = ['lambda-calculus-tools', 'run', 'code.lam'];
		}
                // 处理标准输入、输出、错误流
                let fds = [
                    new OpenFile(new File()), // 标准输入
                    new ConsoleStdout(buffer => {
                        let s = new TextDecoder('utf-8').decode(buffer);
                        stdout(s);
                    }),
                    new ConsoleStdout(buffer => {
                        let s = new TextDecoder('utf-8').decode(buffer);
                        stderr(s);
                    }),
                    new PreopenDirectory(".", [
                        ['code.lam', new File(new TextEncoder('utf-8').encode(code))]
                    ])
                ];
                let wasi = new WASI(args, env, fds);
                let __exports = {};
                const response = await fetch('./lambda-calculus-tools.wasm');
                const buffer = await response.arrayBuffer();
                let instance = (await WebAssembly.instantiate(buffer, {
                    "wasi_snapshot_preview1": wasi.wasiImport
                })).instance; // 创建WASM实例
                wasi.start(instance);
            }

            document.getElementById('calculate').addEventListener('click', function () {
                let code = document.getElementById('code').value;
                document.getElementById('resultTitle').textContent = 'main函数的计算结果：';
                document.getElementById('result').textContent = '';
                document.getElementById('resultBytes').hidden = true;
                document.getElementById('error-message').hidden = true;
                document.getElementById('error-message-content').textContent = '';
                runWasm(code, (buffer) => {
                    document.getElementById('result').textContent += buffer;
                }, (buffer) => {
                    if (document.getElementById('error-message').hidden) {
                        document.getElementById('error-message').hidden = false;
                    }
                    document.getElementById('error-message-content').textContent += buffer;
                }, 'calculate');
            });

            document.getElementById('run').addEventListener('click', function () {
                let code = document.getElementById('code').value;
                document.getElementById('resultTitle').textContent = '运行结果';
                document.getElementById('result').textContent = '';
                document.getElementById('resultBytes').textContent = '';
                document.getElementById('resultBytes').hidden = false;
                document.getElementById('error-message').hidden = true;
                document.getElementById('error-message-content').textContent = '';
		let bitCount = 0;
		let bitString = '';
		function addBit(bit) {
                    bitCount++;
		    bitString += bit;
		    if (bitCount == 8) {
		        document.getElementById('resultBytes').textContent += String.fromCharCode(parseInt(bitString, 2))
			bitCount = 0;
			bitString = '';
		    }
		}
                runWasm(code, (buffer) => {
                    document.getElementById('result').textContent += buffer;
		    for (let i = 0; i < buffer.length; i++) {
                        addBit(buffer[i]);
		    }
                }, (buffer) => {
                    if (document.getElementById('error-message').hidden) {
                        document.getElementById('error-message').hidden = false;
                    }
                    document.getElementById('error-message-content').textContent += buffer;
                }, 'run');
            });

            document.getElementById('loadCalculateModeCode').addEventListener('click', function () {
                document.getElementById('code').value = calculateModeCode;
            });
            document.getElementById('loadRunModeCode').addEventListener('click', function () {
                document.getElementById('code').value = runModeCode;
            });

            document.getElementById('code').value = calculateModeCode;
            document.getElementById('resultBytes').hidden = true;

        </script>
    </body>
</html>
